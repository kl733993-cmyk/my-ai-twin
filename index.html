<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AI Avatar Live</title>
    <style>
        body { margin: 0; background: radial-gradient(circle, #222, #000); overflow: hidden; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui { position: absolute; bottom: 10%; z-index: 100; text-align: center; width: 100%; }
        button { padding: 20px 40px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 50px; border: none; background: #007bff; color: white; box-shadow: 0 4px 15px rgba(0,123,255,0.4); transition: 0.3s; }
        button:hover { background: #0056b3; transform: scale(1.05); }
        button.active { background: #ff4444; }
        #status { color: #aaa; margin-top: 15px; font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="talkBtn">START CONVERSATION</button>
        <div id="status">Ready to connect</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import Vapi from 'https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js';

        // --- DATA FROM YOUR PROMPTS ---
        const PUBLIC_KEY = "c51f446e-9289-412e-8275-b77b710b08bd"; 
        const ASSISTANT_ID = "8437d98b-4600-458e-9239-3ed51c84b39b";
        const AVATAR_URL = 'https://models.readyplayer.me/648b293848b6107c191e4f4b.glb'; // Default high-quality avatar

        // --- SETUP 3D SCENE ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.4, 1.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const spotLight = new THREE.SpotLight(0xffffff, 10);
        spotLight.position.set(0, 5, 5);
        scene.add(spotLight);

        let model;
        const loader = new GLTFLoader();
        loader.load(AVATAR_URL, (gltf) => {
            model = gltf.scene;
            model.position.y = -0.5;
            scene.add(model);
        });

        // --- VAPI AI LOGIC ---
        const vapi = new Vapi(PUBLIC_KEY);
        const btn = document.getElementById('talkBtn');
        const status = document.getElementById('status');
        let isCallActive = false;

        btn.addEventListener('click', () => {
            if (!isCallActive) {
                vapi.start(ASSISTANT_ID);
                status.innerText = "Connecting to Gemini...";
            } else {
                vapi.stop();
            }
        });

        vapi.on('call-start', () => {
            isCallActive = true;
            btn.innerText = "STOP CALL";
            btn.classList.add('active');
            status.innerText = "Listening... Start talking!";
        });

        vapi.on('call-end', () => {
            isCallActive = false;
            btn.innerText = "START CONVERSATION";
            btn.classList.remove('active');
            status.innerText = "Call ended.";
        });

        // --- LIP SYNC EMULATION ---
        vapi.on('speech-start', () => {
            status.innerText = "AI is speaking...";
            if(model) model.scale.set(1.02, 1.02, 1.02); // Small visual pulse
        });

        vapi.on('speech-end', () => {
            status.innerText = "Listening...";
            if(model) model.scale.set(1, 1, 1);
        });

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (model) model.rotation.y += 0.002; // Slow idle turn
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
